<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />

    <meta name="author" content="CrushRadar" />

    <!-- Theme & Colors -->
    <meta name="theme-color" content="#0a0a0a" />
    <meta name="msapplication-TileColor" content="#0a0a0a" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    
    <!-- PWA & Mobile - Full Screen App -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="CrushRadar" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="CrushRadar" />
    <meta name="format-detection" content="telephone=no" />
    
    <!-- Icons -->
    <link rel="icon" type="image/png" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="192x192" href="/pwa-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/pwa-512x512.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/apple-touch-icon.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/apple-touch-icon.png" />
    <link rel="mask-icon" href="/mask-icon.svg" color="#22c55e" />
    <link rel="manifest" href="/manifest.json" crossorigin="anonymous" />
    
    <!-- Open Graph -->
    <meta property="og:title" content="CrushRadar - Find Mutual Crushes Anonymously" />
    <meta property="og:description" content="The privacy-first mutual crush detection app. Zero awkwardness guaranteed." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://crushradar.app" />

    <meta property="og:site_name" content="CrushRadar" />
    
    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="CrushRadar - Find Mutual Crushes Anonymously" />
    <meta name="twitter:description" content="The privacy-first mutual crush detection app. Zero awkwardness guaranteed." />
    <meta name="twitter:image" content="/og-image.png" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      (function() {
        // Service Worker Registration with Update Handling
        if ('serviceWorker' in navigator) {
          var refreshing = false;
          
          // Listen for controller change (new SW activated)
          navigator.serviceWorker.addEventListener('controllerchange', function() {
            if (!refreshing) {
              refreshing = true;
              window.location.reload();
            }
          });

          window.addEventListener('load', function() {
            navigator.serviceWorker.register('/service-worker.js')
              .then(function(registration) {
                console.log('SW registered:', registration.scope);
                
                // Check for updates
                registration.addEventListener('updatefound', function() {
                  var newWorker = registration.installing;
                  if (newWorker) {
                    newWorker.addEventListener('statechange', function() {
                      if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                        // Show update prompt
                        showUpdateBanner();
                      }
                    });
                  }
                });
              })
              .catch(function(error) {
                console.log('SW registration failed:', error);
              });
          });
        }

        function showUpdateBanner() {
          // Remove existing banner if any
          var existing = document.getElementById('sw-update-banner');
          if (existing) existing.remove();

          var banner = document.createElement('div');
          banner.id = 'sw-update-banner';
          banner.innerHTML = '' +
            '<style>' +
            '#sw-update-banner {' +
            '  position: fixed;' +
            '  bottom: 100px;' +
            '  left: 50%;' +
            '  transform: translateX(-50%);' +
            '  background: linear-gradient(135deg, #22C55E 0%, #16a34a 100%);' +
            '  color: white;' +
            '  padding: 14px 24px;' +
            '  border-radius: 16px;' +
            '  font-family: system-ui, -apple-system, sans-serif;' +
            '  font-size: 15px;' +
            '  font-weight: 600;' +
            '  box-shadow: 0 8px 32px rgba(34, 197, 94, 0.4);' +
            '  z-index: 999999;' +
            '  display: flex;' +
            '  align-items: center;' +
            '  gap: 16px;' +
            '}' +
            '#sw-update-banner button {' +
            '  background: white;' +
            '  color: #16a34a;' +
            '  border: none;' +
            '  padding: 8px 18px;' +
            '  border-radius: 8px;' +
            '  font-weight: 700;' +
            '  cursor: pointer;' +
            '  font-size: 14px;' +
            '}' +
            '#sw-update-banner button:hover {' +
            '  transform: scale(1.05);' +
            '}' +
            '</style>' +
            '<span>New version available!</span>' +
            '<button id="sw-update-btn">Update Now</button>';
          document.body.appendChild(banner);
          
          document.getElementById('sw-update-btn').addEventListener('click', function() {
            window.location.reload();
          });
          
          // Auto dismiss after 15 seconds
          setTimeout(function() { banner.remove(); }, 15000);
        }
      })();
    </script>
  </body>
</html>
